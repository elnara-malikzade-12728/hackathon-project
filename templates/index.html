<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SymptomMap</title>
    
    <!-- Leaflet.js CSS for OpenStreetMap -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    
    <link rel="stylesheet" href="../static/style.css" />
</head>
<body>

    <div class="top-bar">
        <h2 id="mainTitle">🏥 AI SymptomTriage</h2>
        <div class="lang-selector">
            <select id="langSheet" onchange="switchLanguageInterface()">
                <!-- 🔥 FIXED LOCALIZATION OPTION RANKINGS -->
                <option value="az" selected>🇦🇿 Azərbaycan</option>
                <option value="en">🇺🇸 English</option>
                <option value="ru">🇷🇺 Русский</option>
            </select>
        </div>
    </div>

    <div class="container">
        <!-- Input Panel Module Component -->
        <div class="panel">
            <h3 id="inputHeading">-</h3>
            <div id="locationAdvisor" class="location-status">-</div>

            <p id="inputSub" style="font-size: 14px; color: #64748b;">-</p>
            <textarea id="symptomsInput"></textarea>
            
            <label style="display: flex; gap: 10px; align-items: flex-start; font-size: 14px; margin-bottom: 15px; cursor: pointer;">
                <input type="checkbox" id="disclaimerCheck" required>
                <span id="checkboxText">-</span>
            </label>

            

            <button id="submitBtn" onclick="runTriagePipeline()">-</button>
            <div class="disclaimer-box" id="disclaimerText">-</div>
        </div>

        <!-- Output Assessment Panel Module Component -->
        <div class="panel" id="outputPanel" style="opacity: 0.2; pointer-events: none;">
            <h3 id="outputHeading">-</h3>
            <div id="urgencyBadge" class="badge" style="display: none;">-</div>
            <p><strong id="lblReason">-</strong> <span id="clinicalReason">...</span></p>
            <p><strong id="lblSpecialist">-</strong> <span id="specialistTarget">-</span></p>
            <h3 id="facilitiesHeading">-</h3>
            <div id="hospitalList"></div>
        </div>

        <!-- Interactive OpenStreetMap Leaflet Component -->
        <div class="panel full-width">
            <h3 id="mapHeading">-</h3>
            <div style="background: #0f172a; border-radius: 8px; padding: 10px; box-shadow: inset 0 0 20px rgba(0,0,0,0.8);">
                <div id="osmMap" style="width: 100%; height: 400px; border-radius: 6px; background: #0f172a;"></div>
            </div>
        </div>
    </div>

    <!-- Script Layer Injection Link -->
    <script src="../static/script.js"></script>
</body>
</html>
