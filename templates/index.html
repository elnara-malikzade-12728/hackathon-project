<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symptom Triage</title>
    <link rel="stylesheet" href="../static/style.css" />
</head>
<body>

    <nav class="navbar">
        <div class="navbar-title" id="mainTitle">Symptom Triage</div>
        <div class="lang-selector">
            <select id="langSheet" onchange="switchLanguageInterface()">
                <!-- 🔥 FIXED LOCALIZATION OPTION RANKINGS -->
                <option value="az" selected>🇦🇿 Azərbaycan</option>
                <option value="en">🇺🇸 English</option>
                <option value="ru">🇷🇺 Русский</option>
            </select>
        </div>
    </nav>

    <div class="container">
        <!-- Input Panel Module Component -->
        <div class="panel">
            <h3 id="inputHeading">-</h3>
            <div id="locationAdvisor" class="location-status">-</div>

            <p id="inputSub" style="font-size: 14px; color: #64748b;">-</p>
            <div class="patient-profile-row">
                <input type="number" id="ageInput" min="0" max="120">
                <select id="genderInput">
                    <option value="Not specified" id="optGenNone">-</option>
                    <option value="Male" id="optGenM">-</option>
                    <option value="Female" id="optGenF">-</option>
                </select>
            </div>
            <input type="text" id="chronicInput" class="full-width-input">
            <textarea id="symptomsInput"></textarea>
            
            <label style="display: flex; gap: 10px; align-items: flex-start; font-size: 14px; margin-bottom: 15px; cursor: pointer;">
                <input type="checkbox" id="disclaimerCheck" required>
                <span id="checkboxText">-</span>
            </label>

            

            <button id="submitBtn" onclick="runTriagePipeline()">-</button>
            <div class="disclaimer-box" id="disclaimerText">-</div>
        </div>

    </div>

    <footer class="footer">© 2026 Symptom Triage</footer>

    <!-- Script Layer Injection Link -->
    <script src="../static/script.js"></script>
</body>
</html>
